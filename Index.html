<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charlton's Barber Studio</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0d0d0d;
  color: white;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: black;
  position: sticky;
  top: 0;
}
nav a {
  color: gold;
  text-decoration: none;
  margin-left: 15px;
}

/* HERO */
.hero {
  height: 90vh;
  background: url('https://images.unsplash.com/photo-1585747860715-2ba37e788b70') center/cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.hero h1 {
  font-size: 40px;
}
.btn {
  background: gold;
  padding: 12px 20px;
  margin-top: 15px;
  color: black;
  text-decoration: none;
  border-radius: 5px;
}

/* SECTIONS */
.section {
  padding: 50px 20px;
  text-align: center;
}

/* SERVICES */
.services {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}
.card {
  background: #1a1a1a;
  margin: 10px;
  padding: 20px;
  width: 200px;
  border-radius: 10px;
}

/* GALLERY */
.gallery img {
  width: 30%;
  margin: 5px;
  border-radius: 10px;
}

/* FORM */
form input, form select {
  width: 80%;
  padding: 10px;
  margin: 10px;
  border: none;
  border-radius: 5px;
}

/* FOOTER */
footer {
  background: black;
  padding: 20px;
  text-align: center;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div>💈 Charlton's Barber</div>
  <div>
    <a href="#services">Services</a>
    <a href="#gallery">Gallery</a>
    <a href="#booking">Book</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Sharp Cuts. Clean Style.</h1>
  <a class="btn" href="https://wa.me/27615159924">Book Now</a>
</div>

<!-- SERVICES -->
<div class="section" id="services">
  <h2>Our Services</h2>
  <div class="services">
    <div class="card">Haircut - R100</div>
    <div class="card">Fade - R120</div>
    <div class="card">Beard Trim - R80</div>
    <div class="card">Full Groom - R180</div>
  </div>
</div>

<!-- GALLERY -->
<div class="section gallery" id="gallery">
  <h2>Our Work</h2>
  <img src="https://images.unsplash.com/photo-1517836357463-d25dfeac3438">
  <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
  <img src="https://images.unsplash.com/photo-1599351431202-1e0f0137899a">
</div>

<!-- BOOKING -->
<div class="section" id="booking">
  <h2>Book Appointment</h2>
  <form onsubmit="sendToWhatsApp(); return false;">
    <input type="text" id="name" placeholder="Your Name" required><br>
    <input type="text" id="phone" placeholder="Phone Number" required><br>
    
    <select id="service">
      <option>Haircut</option>
      <option>Fade</option>
      <option>Beard Trim</option>
    </select><br>

    <input type="date" id="date" required><br>

    <button class="btn" type="submit">Book via WhatsApp</button>
  </form>
</div>

<!-- MAP -->
<div class="section">
  <h2>Find Us</h2>
  <iframe 
    src="https://maps.google.com/maps?q=Cape%20Town&t=&z=13&ie=UTF8&iwloc=&output=embed"
    width="90%" height="300" style="border:0;">
  </iframe>
</div>

<!-- FOOTER -->
<footer>
  © 2026 Charlton's Barber Studio | Cape Town
</footer>

<script>
function sendToWhatsApp() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let service = document.getElementById("service").value;
  let date = document.getElementById("date").value;

  let message = `Booking Request:%0AName: ${name}%0APhone: ${phone}%0AService: ${service}%0ADate: ${date}`;

  window.open(`https://wa.me/27615159924?text=${message}`, "_blank");
}
</script>

</body>
</html>
